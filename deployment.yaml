apiVersion: apps/v1
kind: Deployment

metadata:
  name: register-app
  namespace: register-app

spec:
  replicas: 2

  strategy:
    type: RollingUpdate

    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app: register-app

  template:
    metadata:
      labels:
        app: register-app

    spec:
      containers:
      - name: register-app

        image: localhost:5000/register-app:1

        imagePullPolicy: Always

        ports:
        - containerPort: 3000

        envFrom:
        - configMapRef:
            name: app-config

        - secretRef:
            name: app-secret

        resources:
          requests:
            cpu: "100m"
          limits:
            cpu: "500m"
