apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: register-app
  namespace: register-app

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: register-app

  minReplicas: 2
  maxReplicas: 5

  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
